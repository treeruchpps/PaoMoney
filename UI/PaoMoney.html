function Icon({ name, size=18, color, className='' }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && window.lucide) {
      ref.current.innerHTML = '';
      const icons = window.lucide;
      const iconFn = icons[name] || icons['Circle'];
      if (iconFn) {
        const svg = iconFn[2]; // SVG path data
        ref.current.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color||'currentColor'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${svg ? svg.map(s => `<${s[0]} ${Object.entries(s[1]||{}).map(([k,v])=>`${k}="${v}"`).join(' ')}></${s[0]}>`).join('') : ''}</svg>`;
      }
    }
  }, [name, size, color]);
  return <span ref={ref} className={`inline-flex items-center justify-center ${className}`} />;
}

// ─── DONUT CHART ─────────────────────────────────────────
function DonutChart({ data, size=180 }) {
  const total = data.reduce((s,d) => s+d.value, 0);
  let cumulative = 0;
  const cx = size/2, cy = size/2, r = size*0.38, innerR = size*0.22;
  const segments = data.map(d => {
    const pct = d.value / total;
    const startAngle = cumulative * 2 * Math.PI - Math.PI/2;
    cumulative += pct;
    const endAngle = cumulative * 2 * Math.PI - Math.PI/2;
    const x1 = cx + r * Math.cos(startAngle), y1 = cy + r * Math.sin(startAngle);
    const x2 = cx + r * Math.cos(endAngle), y2 = cy + r * Math.sin(endAngle);
    const ix1 = cx + innerR * Math.cos(startAngle), iy1 = cy + innerR * Math.sin(startAngle);
    const ix2 = cx + innerR * Math.cos(endAngle), iy2 = cy + innerR * Math.sin(endAngle);
    const large = pct > 0.5 ? 1 : 0;
    const path = `M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} L ${ix2} ${iy2} A ${innerR} ${innerR} 0 ${large} 0 ${ix1} ${iy1} Z`;
    return { ...d, path, pct };
  });
  return (
    <svg width={size} height={size}>
      {segments.map((s,i) => (
        <path key={i} d={s.path} fill={s.color} opacity="0.9" className="cursor-pointer hover:opacity-100 transition-opacity" />
      ))}
      <circle cx={cx} cy={cy} r={innerR-2} fill="white" />
      <text x={cx} y={cy-6} textAnchor="middle" fontSize="11" fill="#64748b" fontFamily="Sarabun">รายจ่าย</text>
      <text x={cx} y={cy+10} textAnchor="middle" fontSize="13" fontWeight="700" fill="#1e293b" fontFamily="Sarabun">{fmt(total)}</text>
      <text x={cx} y={cy+24} textAnchor="middle" fontSize="10" fill="#94a3b8" fontFamily="Sarabun">บาท</text>
    </svg>
  );
}

// ─── BAR CHART ───────────────────────────────────────────
function BarChart({ data }) {
  const maxVal = Math.max(...data.map(d => Math.max(d.income, d.expense)));
  const W=320, H=160, padL=10, padR=10, padT=10, padB=30;
  const chartW = W - padL - padR, chartH = H - padT - padB;
  const barW = (chartW / data.length) * 0.35;
  const gap = (chartW / data.length) * 0.1;
  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`}>
      {[0, 0.25, 0.5, 0.75, 1].map((t, i) => (
        <line key={i} x1={padL} x2={W-padR} y1={padT + chartH*(1-t)} y2={padT + chartH*(1-t)} stroke="#e2e8f0" strokeWidth="1" />
      ))}
      {data.map((d, i) => {
        const x = padL + (chartW / data.length) * i + gap;
        const incH = (d.income / maxVal) * chartH;
        const expH = (d.expense / maxVal) * chartH;
        return (
          <g key={i}>
            <rect x={x} y={padT + chartH - incH} width={barW} height={incH} fill="#10b981" rx="3" opacity="0.85" />
            <rect x={x + barW + 3} y={padT + chartH - expH} width={barW} height={expH} fill="#f43f5e" rx="3" opacity="0.85" />
            <text x={x + barW} y={H - 8} textAnchor="middle" fontSize="9" fill="#94a3b8" fontFamily="Sarabun">{d.month}</text>
          </g>
        );
      })}
    </svg>
  );
}

// ─── ANALYTICS VIEW ───────────────────────────────────────
function AnalyticsView({ accounts, transactions }) {
  const totalAssets = accounts.filter(a=>a.balance>0).reduce((s,a)=>s+a.balance,0);
  const totalLiab = Math.abs(accounts.filter(a=>a.balance<0).reduce((s,a)=>s+a.balance,0));
  const netWorth = totalAssets - totalLiab;

  const thisMonth = transactions.filter(t => t.date?.startsWith('2026-04'));
  const income = thisMonth.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense = thisMonth.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);

  // Donut data
  const expBycat = {};
  thisMonth.filter(t=>t.type==='expense').forEach(t => {
    expBycat[t.category] = (expBycat[t.category]||0) + t.amount;
  });
  const donutData = Object.entries(expBycat).map(([id, value]) => {
    const cat = getCat(id);
    return { label:cat.name, value, color:cat.color };
  }).sort((a,b)=>b.value-a.value);

  // Top 5 expenses
  const top5 = [...thisMonth.filter(t=>t.type==='expense')].sort((a,b)=>b.amount-a.amount).slice(0,5);

  // Bar chart data (last 6 months)
  const barData = [
    { month:'พ.ย.', income:38000, expense:22000 },
    { month:'ธ.ค.', income:41000, expense:35000 },
    { month:'ม.ค.', income:38500, expense:28000 },
    { month:'ก.พ.', income:39000, expense:31000 },
    { month:'มี.ค.', income:43000, expense:26000 },
    { month:'เม.ย.', income, expense },
  ];

  const lastMonthExpense = 26000;
  const momChange = ((expense - lastMonthExpense) / lastMonthExpense * 100).toFixed(1);

  return (
    <div className="p-6 space-y-5">
      {/* Net Worth */}
      <div className="grid grid-cols-4 gap-4">
        {[
          { label:'มูลค่าสุทธิ', value:netWorth, color:'#6366f1', bg:'#eef2ff', large:true },
          { label:'สินทรัพย์รวม', value:totalAssets, color:'#10b981', bg:'#f0fdf4' },
          { label:'หนี้สินรวม', value:totalLiab, color:'#ef4444', bg:'#fff1f2' },
          { label:'รายได้เดือนนี้', value:income, color:'#10b981', bg:'#f0fdf4' },
        ].map((s,i) => (
          <div key={i} className="rounded-2xl p-4 card-hover" style={{background:s.bg}}>
            <p className="text-xs text-slate-500 mb-1">{s.label}</p>
            <p className={`font-bold ${s.large?'text-2xl':'text-xl'}`} style={{color:s.color}}>฿{fmt(s.value)}</p>
          </div>
        ))}
      </div>

      <div className="grid grid-cols-5 gap-4">
        {/* Donut + legend */}
        <div className="col-span-2 bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-semibold text-slate-700">รายจ่ายตามหมวด</h3>
          </div>
          <div className="flex items-start gap-4">
            <DonutChart data={donutData} size={160} />
            <div className="flex-1 space-y-2 mt-2">
              {donutData.slice(0,5).map((d,i) => (
                <div key={i} className="flex items-center justify-between">
                  <div className="flex items-center gap-2">
                    <div className="w-2.5 h-2.5 rounded-full" style={{background:d.color}} />
                    <span className="text-xs text-slate-600">{d.label}</span>
                  </div>
                  <span className="text-xs font-medium text-slate-700">฿{fmt(d.value)}</span>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* Bar chart */}
        <div className="col-span-3 bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
          <div className="flex items-center justify-between mb-4">
            <h3 className="text-sm font-semibold text-slate-700">รายรับ vs รายจ่าย</h3>
            <div className="flex gap-3 text-xs">
              <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-full bg-emerald-400" /><span className="text-slate-500">รายรับ</span></div>
              <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-full bg-rose-400" /><span className="text-slate-500">รายจ่าย</span></div>
            </div>
          </div>
          <BarChart data={barData} />
          <div className="mt-3 flex items-center gap-2 bg-slate-50 rounded-xl px-3 py-2.5">
            <div className={`w-7 h-7 rounded-lg flex items-center justify-center ${parseFloat(momChange)<0?'bg-emerald-50':'bg-red-50'}`}>
              <LIcon name={parseFloat(momChange)<0?'TrendingDown':'TrendingUp'} size={14} color={parseFloat(momChange)<0?'#10b981':'#ef4444'} />
            </div>
            <p className="text-xs text-slate-600">
              รายจ่ายเดือนนี้ <span className={`font-bold ${parseFloat(momChange)<0?'text-emerald-500':'text-red-500'}`}>{parseFloat(momChange)<0?'ลดลง':'เพิ่มขึ้น'} {Math.abs(momChange)}%</span> จากเดือนก่อน
            </p>
          </div>
        </div>
      </div>

      {/* Top 5 */}
      <div className="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
        <h3 className="text-sm font-semibold text-slate-700 mb-4">Top 5 รายจ่ายสูงสุด</h3>
        <div className="space-y-3">
          {top5.map((tx, i) => {
            const cat = getCat(tx.category);
            const pct = (tx.amount / top5[0].amount) * 100;
            return (
              <div key={tx.id} className="flex items-center gap-3">
                <div className="w-6 text-center text-xs font-bold text-slate-400">#{i+1}</div>
                <div className="w-8 h-8 rounded-xl flex items-center justify-center flex-shrink-0" style={{background:cat.color+'22'}}>
                  <LIcon name={cat.icon} size={16} color={cat.color} />
                </div>
                <div className="flex-1 min-w-0">
                  <div className="flex justify-between items-center mb-1">
                    <p className="text-xs font-medium text-slate-700">{tx.note}</p>
                    <p className="text-xs font-bold text-slate-800 ml-2">฿{fmt(tx.amount)}</p>
                  </div>
                  <div className="w-full bg-slate-100 rounded-full h-1.5 overflow-hidden">
                    <div className="h-full rounded-full" style={{width:`${pct}%`, background:cat.color}} />
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

    "accentColor": "#3b82f6",
    "darkMode": false,
    "compactMode": false,
    "userName": "ปาว"
  }/*EDITMODE-END*/;
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);

  useEffect(() => { localStorage.setItem('paomoney_view', view); }, [view]);

  // Tweaks panel protocol
  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const updateTweak = (key, val) => {
    const next = { ...tweaks, [key]: val };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
  };

  const accent = tweaks.accentColor;
  const isDark = tweaks.darkMode;

  const totalAssets = accounts.filter(a=>a.balance>0).reduce((s,a)=>s+a.balance,0);
  const totalLiab = accounts.filter(a=>a.balance<0).reduce((s,a)=>s+a.balance,0);

  const pageTitle = NAV.find(n => n.id === view)?.label || '';

  return (
    <div className={`flex h-screen overflow-hidden ${isDark ? 'bg-slate-900 text-slate-100' : 'bg-slate-50 text-slate-800'}`}>
      {/* Sidebar */}
      <aside className={`flex flex-col ${sidebarCollapsed ? 'w-16' : 'w-60'} flex-shrink-0 transition-all duration-200 border-r ${isDark?'bg-slate-900 border-slate-800':'bg-white border-slate-100'} shadow-sm`}>

            <LIcon name="Wallet" size={18} color="white" />
          </div>
          {!sidebarCollapsed && <span className="text-base font-bold" style={{color:accent}}>PaoMoney</span>}
        </div>
        {/* User */}
        {!sidebarCollapsed && (
          <div className={`mx-3 mb-3 p-3 rounded-xl ${isDark?'bg-slate-800':'bg-slate-50'}`}>
            <div className="flex items-center gap-2.5">
              <div className="w-8 h-8 rounded-full flex items-center justify-center text-white text-sm font-bold" style={{background: accent}}>
                {tweaks.userName?.[0] || 'P'}
              </div>
              <div>
                <p className="text-xs font-semibold">{tweaks.userName}</p>
                <p className="text-xs text-slate-400">฿{fmt(totalAssets+totalLiab)} สุทธิ</p>
              </div>
            </div>
          </div>
        )}
        {/* Nav */}
        <nav className="flex-1 px-2 space-y-0.5 overflow-y-auto">
          {NAV.map(item => (
            <button key={item.id} onClick={() => setView(item.id)}
              className={`sidebar-item w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm transition-all ${view===item.id ? 'active font-semibold' : isDark?'text-slate-400 hover:text-slate-200':'text-slate-500 hover:text-slate-800'}`}
              style={view===item.id ? {color:accent} : {}}>
              <LIcon name={item.icon} size={18} color={view===item.id ? accent : undefined} />
              {!sidebarCollapsed && <span>{item.label}</span>}
            </button>
          ))}
        </nav>
        {/* Bottom */}
        <div className="px-2 pb-4 space-y-0.5">
          <button className={`sidebar-item w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm ${isDark?'text-slate-400':'text-slate-400'}`}>
            <LIcon name="Settings" size={17} />
            {!sidebarCollapsed && <span>ตั้งค่า</span>}
          </button>
          <button onClick={() => setSidebarCollapsed(c => !c)} className={`sidebar-item w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm ${isDark?'text-slate-400':'text-slate-400'}`}>
            <LIcon name="Menu" size={17} />
            {!sidebarCollapsed && <span>ย่อแถบเมนู</span>}
          </button>
        </div>
      </aside>

      {/* Main */}
      <div className="flex-1 flex flex-col min-w-0 overflow-hidden">
        {/* Topbar */}
        <header className={`flex-shrink-0 border-b px-6 py-4 flex items-center justify-between ${isDark?'bg-slate-900 border-slate-800':'bg-white border-slate-100'} shadow-sm`}>
          <div>
            <h1 className="text-lg font-bold text-slate-800">{pageTitle}</h1>
            <p className="text-xs text-slate-400 mt-0.5">19 เมษายน 2569</p>
          </div>
          <div className="flex items-center gap-3">
            <div className={`flex items-center gap-2 border rounded-xl px-3 py-2 text-sm ${isDark?'border-slate-700 bg-slate-800':'border-slate-200 bg-slate-50'}`}>
              <LIcon name="Search" size={15} color="#94a3b8" />
              <input placeholder="ค้นหา..." className="bg-transparent text-sm w-32 text-slate-600 placeholder-slate-400" />
            </div>
            <button className="relative p-2.5 rounded-xl hover:bg-slate-100 text-slate-500">
              <LIcon name="Bell" size={18} />
              <span className="absolute top-1.5 right-1.5 w-2 h-2 rounded-full" style={{background:accent}} />
            </button>
            <div className="w-9 h-9 rounded-full flex items-center justify-center text-white text-sm font-bold" style={{background: accent}}>
              {tweaks.userName?.[0] || 'P'}
            </div>
          </div>
        </header>
        {/* Page Content */}
        <main className="flex-1 overflow-y-auto">
          {view === 'accounts' && <AccountsView accounts={accounts} setAccounts={setAccounts} />}
          {view === 'transactions' && <TransactionsView transactions={transactions} setTransactions={setTransactions} accounts={accounts} />}
          {view === 'budgets' && <BudgetsView />}
          {view === 'goals' && <GoalsView accounts={accounts} />}
          {view === 'analytics' && <AnalyticsView accounts={accounts} transactions={transactions} />}
          {view === 'categories' && <CategoriesView />}
        </main>
      </div>

      {/* Tweaks Panel */}
      {tweaksOpen && (
        <div className="fixed bottom-4 right-4 z-50 bg-white rounded-2xl shadow-2xl border border-slate-200 w-72 modal-box">
          <div className="flex items-center justify-between px-4 py-3 border-b border-slate-100">
            <p className="text-sm font-semibold text-slate-700">Tweaks</p>
            <button onClick={() => setTweaksOpen(false)} className="text-slate-400 hover:text-slate-600"><LIcon name="X" size={16} /></button>
          </div>
          <div className="p-4 space-y-4">
            <div>
              <label className="text-xs font-medium text-slate-500 mb-2 block">สีหลัก</label>
              <div className="flex gap-2 flex-wrap">
                {['#6366f1','#10b981','#f59e0b','#3b82f6','#ef4444','#ec4899'].map(c => (
                  <button key={c} onClick={() => updateTweak('accentColor', c)} className="w-7 h-7 rounded-full border-2 transition-all" style={{background:c, borderColor: tweaks.accentColor===c?'#1e293b':'transparent'}} />
                ))}
              </div>
            </div>
            <div className="flex items-center justify-between">
              <label className="text-xs font-medium text-slate-500">โหมดกลางคืน</label>
              <button onClick={() => updateTweak('darkMode', !tweaks.darkMode)} className={`w-10 h-5 rounded-full transition-all ${tweaks.darkMode?'':'bg-slate-200'}`} style={tweaks.darkMode?{background:accent}:{}}>
                <div className={`w-4 h-4 rounded-full bg-white shadow transition-all mx-0.5 ${tweaks.darkMode?'translate-x-5':''}`} style={{transform: tweaks.darkMode?'translateX(20px)':'none'}} />
              </button>
            </div>
            <div>
              <label className="text-xs font-medium text-slate-500 mb-1 block">ชื่อผู้ใช้</label>
              <input value={tweaks.userName} onChange={e => updateTweak('userName', e.target.value)} className="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm bg-slate-50 text-slate-700" />
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
